<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glow orbs -->
  <circle cx="900" cy="150" r="250" fill="url(#glow)"/>
  <circle cx="300" cy="500" r="200" fill="url(#glow)" opacity="0.5"/>

  <!-- Grid pattern subtle -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left content area -->
  <!-- Logo mark -->
  <circle cx="100" cy="200" r="16" fill="#10B981"/>
  <text x="128" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">MediHost</text>
  <text x="340" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">TM</text>
  <text x="365" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#10B981">AI</text>

  <!-- Main headline -->
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#ffffff">Your Clinic's</text>
  <text x="80" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#10B981">Digital Identity</text>

  <!-- Subheadline -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94A3B8">AI Website + Domain + HMS + Billing</text>
  <text x="80" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94A3B8">Live in 60 seconds. Start free.</text>

  <!-- Tagline -->
  <text x="860" y="602" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569">Made in India for Indian Healthcare</text>

  <!-- CTA pill -->
  <rect x="80" y="485" width="220" height="48" rx="24" fill="url(#green)"/>
  <text x="130" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#ffffff">medihost.in →</text>

  <!-- Right side feature cards -->
  <!-- Card 1 -->
  <rect x="700" y="160" width="420" height="70" rx="12" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="730" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#10B981">🌐</text>
  <text x="770" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Custom Domain</text>
  <text x="770" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">yourname.com — registered in 1 click</text>

  <!-- Card 2 -->
  <rect x="700" y="245" width="420" height="70" rx="12" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="730" y="277" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#10B981">✨</text>
  <text x="770" y="277" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff">AI-Powered Website</text>
  <text x="770" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">Generated in seconds, not weeks</text>

  <!-- Card 3 -->
  <rect x="700" y="330" width="420" height="70" rx="12" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="730" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#10B981">🏥</text>
  <text x="770" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Full HMS Suite</text>
  <text x="770" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">OPD, billing, EMR, appointments</text>

  <!-- Card 4 -->
  <rect x="700" y="415" width="420" height="70" rx="12" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="730" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#10B981">📊</text>
  <text x="770" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Google Business + SEO</text>
  <text x="770" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">Get found by patients near you</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="#0B1120"/>
  <text x="80" y="602" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569">🔬 NABL  •  🔒 HIPAA  •  🏥 ABDM  •  📋 GST Compliant</text>
  <text x="860" y="602" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569">Made in India 🇮🇳 for Indian Healthcare</text>
</svg>
